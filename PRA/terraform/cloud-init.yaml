#cloud-config
# ================================================================
# PRA METALIS — Cloud-Init Bootstrap
# Installe k3s + Velero CLI + outils pour restauration PRA
# Exécuté une seule fois au premier démarrage de la VM
# ================================================================

package_update: true
package_upgrade: false

packages:
  - curl
  - jq
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

write_files:
  - path: /etc/sysctl.d/99-k3s.conf
    owner: root:root
    permissions: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
      vm.swappiness                       = 0
      fs.inotify.max_user_instances       = 8192
      fs.inotify.max_user_watches         = 524288

  - path: /etc/modules-load.d/k3s.conf
    owner: root:root
    permissions: "0644"
    content: |
      overlay
      br_netfilter

runcmd:
  # ── Kernel & Swap ──────────────────────────────────────────
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl --system
  - swapoff -a
  - sed -i '/ swap / s/^/#/' /etc/fstab

  # ── k3s (sans traefik — ingress-nginx restauré par Velero) ─
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
  - until /usr/local/bin/kubectl get nodes 2>/dev/null; do sleep 5; done

  # ── Velero CLI ─────────────────────────────────────────────
  - curl -sL "https://github.com/vmware-tanzu/velero/releases/download/${velero_version}/velero-${velero_version}-linux-amd64.tar.gz" -o /tmp/velero.tar.gz
  - tar -xzf /tmp/velero.tar.gz -C /tmp
  - mv "/tmp/velero-${velero_version}-linux-amd64/velero" /usr/local/bin/
  - rm -rf /tmp/velero*

  # ── Helm ───────────────────────────────────────────────────
  - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  # ── Azure CLI ──────────────────────────────────────────────
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  # ── kubectl config pour l'utilisateur ──────────────────────
  - mkdir -p /home/${admin_username}/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/${admin_username}/.kube/config
  - chown -R ${admin_username}:${admin_username} /home/${admin_username}/.kube
  - chmod 600 /home/${admin_username}/.kube/config

  # ── Marker PRA ready ───────────────────────────────────────
  - touch /opt/pra-ready
  - echo "$(date -Iseconds) — PRA VM bootstrap complete" >> /var/log/pra-setup.log
