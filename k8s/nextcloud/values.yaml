## Nextcloud — values Helm (nextcloud/nextcloud — chart officiel)
## Repo : https://nextcloud.github.io/helm/
## Note: bitnami/nextcloud retiré du catalogue gratuit (août 2025)
## Namespace : nextcloud
## URL : http://nextcloud.10.1.248.6.nip.io

nextcloud:
  username: admin
  # password : voir CREDENTIALS.md
  password: "MetalisNC_2026!"
  host: nextcloud.10.1.248.6.nip.io
  update: 0

## MariaDB
mariadb:
  enabled: true
  auth:
    rootPassword: "NCrootDB_2026!"
    password: "NCuserDB_2026!"
    database: nextcloud
    username: nextcloud

## Redis (cache)
redis:
  enabled: true
  auth:
    enabled: true
    password: "NCredis_2026!"

## Stockage
persistence:
  enabled: true
  size: 20Gi
  storageClass: local-path

## Service & Ingress
service:
  type: ClusterIP

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
  hosts:
    - host: nextcloud.10.1.248.6.nip.io
      paths:
        - path: /
          pathType: Prefix

## Ressources
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
