## WordPress — values Helm (bitnami/wordpress)
## Namespace : wordpress
## URL : http://wordpress.10.1.248.100.nip.io

wordpressUsername: admin
# ⚠️ Passwords gérés via docs/CREDENTIALS.md (non versionné)
# Passer via --set à l'install : helm install ... --set wordpressPassword=xxx
wordpressPassword: "CHANGE_ME"
wordpressEmail: admin@metalis.local
wordpressBlogName: "METALIS - Portail Web"
wordpressFirstName: Admin
wordpressLastName: Metalis

## MariaDB
mariadb:
  enabled: true
  auth:
    # ⚠️ Remplacer via --set mariadb.auth.rootPassword=xxx
    rootPassword: "CHANGE_ME"
    password: "CHANGE_ME"
    database: wordpress
    username: wordpress

## Stockage
persistence:
  enabled: true
  size: 8Gi
  storageClass: longhorn

## Service & Ingress
service:
  type: ClusterIP

ingress:
  enabled: true
  ingressClassName: nginx
  hostname: wordpress.10.1.248.100.nip.io
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

## Ressources
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
